  html, body { width: 100%; overflow-x: hidden; }

  .page { max-width: 1500px; margin: 0 auto; padding: 10px 12px 16px; }
  .top-layout {
    display: grid; grid-template-columns: 1fr 260px;
    gap: 12px; align-items: start; margin-bottom: 14px;
  }
  #wheel-wrap { position: relative; width: 100%; min-width: 0; }
  canvas { display: block; width: 100%; height: auto; }

  /* Questionnaire */
  .questionnaire {
    background: #1a1208; border-radius: 4px; padding: 12px;
    border-left: 5px solid #e8420a; display: flex; flex-direction: column;
    min-width: 0; overflow: hidden;
  }
  .q-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 6px; }
  .q-title { font-family: 'Playfair Display', serif; font-size: 0.88rem; font-weight: 700; color: #f5f0e8; }
  .q-count { font-size: 0.6rem; color: #9a9278; padding-top: 2px; white-space: nowrap; }
  .progress { width: 100%; height: 4px; background: rgba(255,255,255,0.1); overflow: hidden; margin-bottom: 7px; }
  .progress-bar { height: 100%; width: 0%; background: #e8420a; transition: width 0.28s ease; }
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.58rem; font-weight: 700; padding: 3px 7px;
    border-radius: 2px; color: #1a1208; margin-bottom: 6px;

const MAX_SCORE = 10;

// ── Canvas geometry ──────────────────────────────────────────────────────────
// LABEL_SIDE: horizontal space per side for side labels
// LABEL_TOP:  vertical space above arc peak for top labels
// ── Responsive dimensions (recomputed on resize) ──────────────────────────────
const BASE_WHEEL_R = 390;
let WHEEL_R, LABEL_SIDE, LABEL_TOP, CY_FOOT, W, H, CX, CY;
let INNER_R, METER_R, MID_R, OUTER_R, BADGE_R;
const GAP = 0.020;

const canvas = document.getElementById('wheel');
const wheelWrap = document.getElementById('wheel-wrap');
const DPR = Math.min(window.devicePixelRatio || 1, 2);
let ctx = canvas.getContext('2d');

function computeDimensions() {
  const availW = wheelWrap.clientWidth || BASE_WHEEL_R * 2 + 180 * 2;
  // Scale WHEEL_R to fit within available width (label rooms are proportional)
  // W = (WHEEL_R + LABEL_SIDE) * 2  where LABEL_SIDE = WHEEL_R * (180/390)
  // So W = WHEEL_R * 2 * (1 + 180/390) = WHEEL_R * 2 * (570/390)
  const scaleFactor = 570 / 390;
  WHEEL_R    = Math.min(BASE_WHEEL_R, Math.floor(availW / (2 * scaleFactor)));
  LABEL_SIDE = Math.round(WHEEL_R * (180 / 390));
  LABEL_TOP  = Math.round(WHEEL_R * (80  / 390));
  CY_FOOT    = Math.round(WHEEL_R * (28  / 390));
  W   = (WHEEL_R + LABEL_SIDE) * 2;
  H   = WHEEL_R + LABEL_TOP + CY_FOOT;
  CX  = W / 2;
  CY  = H - CY_FOOT;
  INNER_R = Math.round(WHEEL_R * (56  / 390));
  METER_R = Math.round(WHEEL_R * (104 / 390));
  MID_R   = Math.round(WHEEL_R * (184 / 390));
  OUTER_R = WHEEL_R - 2;
  BADGE_R = INNER_R - 4;
}

function resizeCanvas() {
  computeDimensions();
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx = canvas.getContext('2d');
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(DPR, DPR);
  drawWheel();
}

computeDimensions();
canvas.width  = Math.round(W * DPR);
canvas.height = Math.round(H * DPR);
canvas.style.width  = W + 'px';
canvas.style.height = H + 'px';
ctx.setTransform(1, 0, 0, 1, 0, 0);
ctx.scale(DPR, DPR);

function fs(px) { return Math.round(px * WHEEL_R / BASE_WHEEL_R); }

// ── Animation ────────────────────────────────────────────────────────────────
let animV = {}, animT = {};
let meterCurrent = 0, meterTarget = 0;
let wavePhase = 0, raf = null;

function initAnim() {
  categories.forEach((cat, ci) => cat.kpis.forEach((kpi, ki) => {
    const k = ci+'_'+ki;
    if (animV[k] === undefined) animV[k] = 0;
    animT[k] = kpi.score / MAX_SCORE;
  }));
}
function triggerAnimation() { initAnim(); computeMeterTarget(); if (!raf) raf = requestAnimationFrame(animLoop); }
function computeMeterTarget() {
  let total = 0, count = 0;
  categories.forEach(c => c.kpis.forEach(k => { total += k.score; count++; }));
  meterTarget = count ? total / (count * MAX_SCORE) : 0;
}
function animLoop() {
  categories.forEach((cat, ci) => cat.kpis.forEach((_, ki) => {
    const k = ci+'_'+ki, t = animT[k]||0, v = animV[k]||0;
    animV[k] = Math.abs(t-v) > 0.001 ? v+(t-v)*0.09 : t;
  }));
  if (Math.abs(meterTarget - meterCurrent) > 0.001) meterCurrent += (meterTarget - meterCurrent) * 0.07;
  else meterCurrent = meterTarget;
  wavePhase += 0.038;
  drawWheel();
  raf = requestAnimationFrame(animLoop);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function hex2rgb(h) { return {r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}; }
function rgba(hex,a) { const {r,g,b}=hex2rgb(hex); return 'rgba('+r+','+g+','+b+','+a+')'; }
function clamp(v,mn,mx) { return Math.max(mn,Math.min(mx,v)); }

function drawSlice(s,e,r0,r1,fill,stroke,lw) {
  stroke=stroke||'rgba(20,14,6,0.92)'; lw=lw||1.8;
  ctx.beginPath();
  ctx.arc(CX,CY,r1,s,e); ctx.arc(CX,CY,r0,e,s,true);
  ctx.closePath(); ctx.fillStyle=fill; ctx.fill();
  ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke();
}

// ── Water meter ───────────────────────────────────────────────────────────────
function drawWaterMeter(fillRatio) {
  fillRatio = clamp(fillRatio,0,1);
  const waterY=CY-fillRatio*METER_R, waveAmp=fillRatio>0.01?4.5:0;
  const wA2=waveAmp*0.45, lx=CX-METER_R-2, rx=CX+METER_R+2;
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX,CY,METER_R-1,Math.PI,0,false);
  ctx.lineTo(CX+INNER_R+1,CY);
  ctx.arc(CX,CY,INNER_R+1,0,Math.PI,true);
  ctx.closePath(); ctx.clip();
  ctx.beginPath(); ctx.moveTo(lx,waterY);
  for (let x=lx;x<=rx;x+=2) {
    const p=(x-lx)/(rx-lx);
    const y=waterY+Math.sin(p*Math.PI*2*2.2+wavePhase)*waveAmp+Math.sin(p*Math.PI*2*1.5+wavePhase*1.3+1.1)*wA2;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(rx,CY+4); ctx.lineTo(lx,CY+4); ctx.closePath();
  const grad=ctx.createLinearGradient(CX,waterY-10,CX,CY);
  grad.addColorStop(0,'#cc1122'); grad.addColorStop(0.4,'#990000'); grad.addColorStop(1,'#5a0008');
  ctx.fillStyle=grad; ctx.fill();
  if (fillRatio>0.02) {
    ctx.beginPath(); ctx.moveTo(lx,waterY+2);
    for (let x=lx;x<=rx;x+=2) {
      const p=(x-lx)/(rx-lx);
      ctx.lineTo(x, waterY+2+Math.sin(p*Math.PI*2*1.4+wavePhase*0.75+2.4)*(waveAmp*0.4));
    }
    ctx.lineTo(rx,waterY+12); ctx.lineTo(lx,waterY+12); ctx.closePath();
    ctx.fillStyle='rgba(255,80,80,0.20)'; ctx.fill();
  }
  ctx.restore();
}

// ── Canvas badge (always centred, never drifts) ───────────────────────────────
function drawBadge(pct) {
  // Dark disc already drawn by main wheel; just draw the text and gold ring
  ctx.save();
  ctx.beginPath(); ctx.arc(CX,CY,BADGE_R,0,Math.PI*2);
  ctx.strokeStyle='#f7b731'; ctx.lineWidth=Math.max(1.2, WHEEL_R/177); ctx.stroke();
  // Percentage
  ctx.font = 'bold '+fs(18)+'px "Playfair Display", Georgia, serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#f7b731';
  ctx.fillText(pct+'%', CX, CY-fs(7));
  // Label
  ctx.font = '700 '+fs(8)+'px "DM Sans", Helvetica, sans-serif';
  ctx.fillStyle='#bfb89e';
  ctx.fillText('OVERALL', CX, CY+fs(6));
  ctx.fillText('SCORE',   CX, CY+fs(16));
  ctx.restore();
}

// ── Category label: plain dark text, horizontal, inside band ─────────────────
function drawCatLabel(text, angle) {
  const r=(MID_R+METER_R)/2;
  const x=CX+Math.cos(angle)*r, y=CY+Math.sin(angle)*r;
  ctx.save();
  ctx.font='700 '+fs(11)+'px "DM Sans",Helvetica,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const words=text.split(' '), maxLW=fs(90), lines=[];
  let line='';
  for (const w of words) {
    const t=line?line+' '+w:w;
    if (ctx.measureText(t).width<=maxLW) line=t;
    else { if(line) lines.push(line); line=w; }
  }
  if (line) lines.push(line);
  const lineH=fs(13), totalH=lines.length*lineH;
  ctx.fillStyle='#1a1208';
  lines.forEach((l,i) => ctx.fillText(l, x, y-totalH/2+lineH*i+lineH/2));
  ctx.restore();
}

// ── Outer labels: ALWAYS horizontal, positioned radially outside the ring ────
// Strategy:
//   1. Compute the label's anchor point along the slice's mid-radius outward.
//   2. For slices on the left half (angle < 1.5PI): right-align, text ends at anchor.
//      For slices on the right half (angle > 1.5PI): left-align, text starts at anchor.
//   3. For slices near the top (within ~30deg of 1.5PI = straight up): place the
//      label further out (extra radial offset) so it doesn't overlap the arc.
//      Stack them at increasing Y offsets so they can't overlap each other.
//
// Each KPI label's position is computed and stored first (pass 1), then
// a simple collision-push is applied in Y before drawing (pass 2).
// We call this from drawWheel() after collecting all label positions.

function collectLabels() {
  const labels = [];
  const catSpan = Math.PI / categories.length;
  categories.forEach((cat,ci) => {
    const cs = Math.PI+ci*catSpan+GAP;
    const ce = Math.PI+(ci+1)*catSpan-GAP;
    const kpiSpan=(ce-cs)/cat.kpis.length;
    cat.kpis.forEach((kpi,ki) => {
      const ks=cs+ki*kpiSpan+GAP*0.25;
      const ke=cs+(ki+1)*kpiSpan-GAP*0.25;
      const km=(ks+ke)/2;
      const cos=Math.cos(km), sin=Math.sin(km);
      // Radial distance from centre to label anchor
      const topAngle=1.5*Math.PI;
      const distTop=Math.abs(km-topAngle);
      const extraR = distTop < 0.55 ? fs(44) + (0.55-distTop)*fs(30) : fs(28); // push top ones further out
      const anchorR = OUTER_R + extraR;
      const ax=CX+cos*anchorR, ay=CY+sin*anchorR;
      const isRight=km>topAngle;
      const fillRatio=clamp(animV[ci+'_'+ki]||0,0,1);
      labels.push({ text:kpi.name, ax, ay, isRight, cos, sin, catColor:cat.color, fillRatio,
                    anchorR, km, ci, ki });
    });
  });
  return labels;
}

function resolveOverlaps(labels) {
  // Sort by Y (top to bottom), then push overlapping labels apart
  const lineH = fs(18); // min vertical separation between labels
  // Separate left and right halves independently
  ['left','right'].forEach(side => {
    const half = labels.filter(l => side==='left' ? l.km<1.5*Math.PI : l.km>=1.5*Math.PI);
    // Sort by Y ascending
    half.sort((a,b) => a.ay - b.ay);
    for (let i=1; i<half.length; i++) {
      const prev=half[i-1], cur=half[i];
      if (cur.ay - prev.ay < lineH) {
        cur.ay = prev.ay + lineH;
      }
    }
  });
}

function drawLabel(l) {
  const { text, ax, ay, isRight, catColor, fillRatio } = l;
  // Leader line: from outer ring edge toward anchor
  const cos=l.cos, sin=l.sin;
  const lx1=CX+cos*(OUTER_R+fs(6)), ly1=CY+sin*(OUTER_R+fs(6));
  const lx2=ax - (isRight?fs(8):-fs(8)), ly2=ay;
  ctx.save();
  ctx.beginPath(); ctx.moveTo(lx1,ly1); ctx.lineTo(lx2,ly2);
  ctx.strokeStyle=fillRatio>0.08?catColor:'#9a9080'; ctx.lineWidth=1.1; ctx.stroke();

  // Text
  ctx.font='600 '+fs(11)+'px "DM Sans",Helvetica,sans-serif';
  ctx.textBaseline='middle'; ctx.textAlign=isRight?'left':'right';
  const tw=ctx.measureText(text).width;
  const bx=isRight?ax-2:ax-tw-2;
  // Solid bg
  ctx.fillStyle='#f5f0e8';
  ctx.fillRect(bx, ay-fs(8), tw+4, fs(16));
  ctx.fillStyle='#1a1208';
  ctx.fillText(text, ax, ay);
  ctx.restore();
}

// ── Main draw ─────────────────────────────────────────────────────────────────
function drawWheel() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f5f0e8'; ctx.fillRect(0,0,W,H);

  const catSpan=Math.PI/categories.length;

  // Pass 1: draw slices and category bands
  categories.forEach((cat,ci) => {
    const cs=Math.PI+ci*catSpan+GAP, ce=Math.PI+(ci+1)*catSpan-GAP;
    const kpiSpan=(ce-cs)/cat.kpis.length;
    drawSlice(cs,ce,METER_R,MID_R,rgba(cat.color,0.18),'rgba(20,14,6,0.88)',2.0);
    drawCatLabel(cat.name,(cs+ce)/2);
    cat.kpis.forEach((kpi,ki) => {
      const ks=cs+ki*kpiSpan+GAP*0.25, ke=cs+(ki+1)*kpiSpan-GAP*0.25;
      const fillRatio=clamp(animV[ci+'_'+ki]||0,0,1);
      const filledR=MID_R+(OUTER_R-MID_R)*fillRatio;
      drawSlice(ks,ke,MID_R,OUTER_R,'#e8e2d4','rgba(20,14,6,0.88)',1.5);
      if (fillRatio>0.005) {
        const grad=ctx.createRadialGradient(CX,CY,MID_R,CX,CY,OUTER_R);
        grad.addColorStop(0,rgba(cat.color,0.50)); grad.addColorStop(1,rgba(cat.color,0.98));
        drawSlice(ks,ke,MID_R,filledR,grad,'rgba(20,14,6,0.10)',0.8);
        ctx.save(); ctx.shadowColor=cat.color; ctx.shadowBlur=10;
        drawSlice(ks,ke,filledR-1.5,filledR+1.5,cat.color,'transparent',0);
        ctx.restore();
      }
    });
  });

  // Pass 2: collect all labels, resolve overlaps, draw them
  const labels = collectLabels();
  resolveOverlaps(labels);
  labels.forEach(l => drawLabel(l));

  // Water meter background
  ctx.beginPath();
  ctx.arc(CX,CY,METER_R,Math.PI,0,false);
  ctx.arc(CX,CY,INNER_R,0,Math.PI,true);
  ctx.closePath(); ctx.fillStyle='#1e120a'; ctx.fill();
  ctx.strokeStyle='rgba(20,14,6,0.88)'; ctx.lineWidth=1.5; ctx.stroke();

  drawWaterMeter(meterCurrent);

  ctx.beginPath(); ctx.arc(CX,CY,METER_R,Math.PI,0,false);
  ctx.strokeStyle='rgba(20,14,6,0.88)'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(CX,CY,INNER_R,Math.PI,0,false);
  ctx.strokeStyle='rgba(20,14,6,0.88)'; ctx.lineWidth=2; ctx.stroke();

  // Baseline
  ctx.beginPath(); ctx.moveTo(CX-OUTER_R-8,CY); ctx.lineTo(CX+OUTER_R+8,CY);
  ctx.strokeStyle='rgba(26,18,8,0.18)'; ctx.lineWidth=1.2; ctx.stroke();

  // Centre badge disc (drawn on canvas, never drifts)
  ctx.beginPath(); ctx.arc(CX,CY,BADGE_R,0,Math.PI*2);
  ctx.closePath(); ctx.fillStyle='#1a1208'; ctx.fill();

  // Water % inside meter
  const mPct=Math.round(meterCurrent*100);
  if (mPct>1) {
    ctx.save();
    ctx.font='700 '+fs(10)+'px "DM Sans",Helvetica,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,210,210,0.92)';
    ctx.fillText(mPct+'%', CX, CY-(INNER_R+METER_R)/2);
    ctx.restore();
  }

  // Badge
  const totalPct = computeTotalPct();
  drawBadge(totalPct);
  document.getElementById('total-score').textContent = totalPct + '%';
}

function computeTotalPct() {
  let total=0, count=0;
  categories.forEach(c=>c.kpis.forEach(k=>{total+=k.score;count++;}));
  return count ? Math.round(total/(count*MAX_SCORE)*100) : 0;
}
function updateTotalScore() { document.getElementById('total-score').textContent=computeTotalPct()+'%'; }
function updateCategoryScore(ci) {
  const total=categories[ci].kpis.reduce((s,k)=>s+k.score,0);
  const el=document.getElementById('cs-'+ci);
  if(el) el.textContent=Math.round(total)+'/'+(categories[ci].kpis.length*MAX_SCORE);
  updateTotalScore();
}

// ── Questionnaire ─────────────────────────────────────────────────────────────
const questions=[];
categories.forEach((cat,ci)=>cat.kpis.forEach((kpi,ki)=>{
  questions.push({ci,ki,category:cat.name,color:cat.color,kpi:kpi.name,question:kpi.question,help:kpi.desc,options:kpi.options});
}));
let currentQ=0;

function setScore(ci,ki,score,source) {
  source=source||'q';
  categories[ci].kpis[ki].score=score;
  animT[ci+'_'+ki]=score/MAX_SCORE;
  const sl=document.getElementById('sl-'+ci+'-'+ki); if(sl) sl.value=score;
  const vb=document.getElementById('vb-'+ci+'-'+ki); if(vb) vb.textContent=score%1===0?score:score.toFixed(1);
  updateCategoryScore(ci); triggerAnimation();
  if(source==='q') renderQuestion();
}

function renderQuestion() {
  const q=questions[currentQ];
  const curScore=categories[q.ci].kpis[q.ki].score;
  document.getElementById('q-count').textContent=(currentQ+1)+' / '+questions.length;
  document.getElementById('progress-bar').style.width=((currentQ+1)/questions.length*100)+'%';
  document.getElementById('cat-dot').style.background=q.color;
  document.getElementById('cat-pill').style.background=q.color;
  document.getElementById('cat-pill-text').textContent=q.category;
  document.getElementById('q-kpi').textContent=q.kpi;
  document.getElementById('q-text').textContent=q.question;
  document.getElementById('q-help').textContent=q.help;
  const ans=document.getElementById('answers'); ans.innerHTML='';
  q.options.forEach(function(opt) {
    const btn=document.createElement('button');
    btn.className='answer-btn'+(curScore===opt.score?' selected':'');
    btn.innerHTML='<strong>'+opt.label+'</strong><span>'+opt.hint+'</span>';
    btn.onclick=function(){setScore(q.ci,q.ki,opt.score,'q');};
    ans.appendChild(btn);
  });
  document.getElementById('prev-btn').disabled=currentQ===0;
  document.getElementById('next-btn').textContent=currentQ===questions.length-1?'Finish':'Next';
}
document.getElementById('next-btn').addEventListener('click',function(){if(currentQ<questions.length-1){currentQ++;renderQuestion();}});
document.getElementById('prev-btn').addEventListener('click',function(){if(currentQ>0){currentQ--;renderQuestion();}});

// ── Fine Tuning ───────────────────────────────────────────────────────────────
function buildPanel() {
  const panel=document.getElementById('kpi-panel'); panel.innerHTML='';
  categories.forEach(function(cat,ci) {
    const block=document.createElement('div'); block.className='cat-block';
    const hdr=document.createElement('div'); hdr.className='cat-header';
    hdr.style.borderLeft='4px solid '+cat.color;
    const dot=document.createElement('div'); dot.className='dot'; dot.style.background=cat.color;
    const nin=document.createElement('input'); nin.type='text'; nin.value=cat.name; nin.className='cat-name-edit';
    nin.addEventListener('input',function(e){cat.name=e.target.value;questions.forEach(function(q){if(q.ci===ci)q.category=cat.name;});renderQuestion();drawWheel();});
    nin.addEventListener('click',function(e){e.stopPropagation();});
    const sc=document.createElement('span'); sc.className='cat-score'; sc.id='cs-'+ci; sc.textContent='0/'+(cat.kpis.length*MAX_SCORE);
    hdr.append(dot,nin,sc);
    const kl=document.createElement('div'); kl.className='kpi-list';
    cat.kpis.forEach(function(kpi,ki){
      const item=document.createElement('div'); item.className='kpi-item';
      const kin=document.createElement('input'); kin.type='text'; kin.value=kpi.name; kin.className='kpi-name-edit';
      kin.addEventListener('input',function(e){kpi.name=e.target.value;const t=questions.find(function(q){return q.ci===ci&&q.ki===ki;});if(t)t.kpi=kpi.name;renderQuestion();drawWheel();});
      const desc=document.createElement('div'); desc.className='kpi-desc'; desc.textContent=kpi.desc;
      const row=document.createElement('div'); row.className='slider-row'; row.style.setProperty('--cc',cat.color);
      const sl=document.createElement('input'); sl.type='range'; sl.min=0; sl.max=MAX_SCORE; sl.step=0.5; sl.value=kpi.score; sl.id='sl-'+ci+'-'+ki;
      const vb=document.createElement('span'); vb.className='vbadge'; vb.id='vb-'+ci+'-'+ki; vb.textContent='0';
      sl.addEventListener('input',function(){setScore(ci,ki,+sl.value,'slider');});
      row.append(sl,vb); item.append(kin,desc,row); kl.appendChild(item);
    });
    block.append(hdr,kl); panel.appendChild(block);
  });
}

function resetAll() {
  categories.forEach(function(cat,ci){cat.kpis.forEach(function(kpi,ki){
    kpi.score=0; animT[ci+'_'+ki]=0;
    const sl=document.getElementById('sl-'+ci+'-'+ki); if(sl) sl.value=0;
    const vb=document.getElementById('vb-'+ci+'-'+ki); if(vb) vb.textContent='0';
  });});
  for(let ci=0;ci<categories.length;ci++) updateCategoryScore(ci);
  currentQ=0; triggerAnimation(); renderQuestion();
}

// Remove hidden total-score span (badge drawn on canvas now, but keep span for compat)
const ts = document.getElementById('total-score');
if (!ts) {
  const s=document.createElement('span'); s.id='total-score'; s.style.display='none'; document.body.appendChild(s);
}

// ── Responsive resize ────────────────────────────────────────────────────────
let resizeRaf = null;
function queueResize() {
  if (resizeRaf) cancelAnimationFrame(resizeRaf);
  resizeRaf = requestAnimationFrame(function() {
    resizeCanvas();
    resizeRaf = null;
  });
}
if (window.ResizeObserver) {
  const ro = new ResizeObserver(queueResize);
  ro.observe(wheelWrap);
}
window.addEventListener('resize', queueResize);
window.addEventListener('orientationchange', queueResize);

buildPanel(); initAnim(); resizeCanvas(); renderQuestion();
raf=requestAnimationFrame(animLoop);
</script>
<!-- Hidden span for total-score text (badge text drawn on canvas) -->
<span id="total-score" style="display:none">0%</span>
</body>
</html>
